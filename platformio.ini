; Indoor_UWB — localización UWB (tag/anchor) con arquitectura Controller + Manager.
; Placas: Makerfabs ESP32 UWB v1.0 (por defecto), Pro con display, ESP32 genérico.

[platformio]
default_envs = uwb_tag

[env:indoor_uwb_libs]
framework = arduino
platform = espressif32
monitor_speed = 115200
board_build.filesystem = littlefs
extra_scripts = pre:scripts/prepare_fs.py
lib_ignore = WebServer
lib_deps =
	SPI
	WiFi
	FS
	ArduinoOTA
	Update
	me-no-dev/ESPAsyncWebServer
	me-no-dev/ESPAsyncTCP@^1.2.2
	arduino-libraries/Arduino_JSON@^0.2.0
	tomstewart89/BasicLinearAlgebra@^3.6.0

; ---------- Tag (robótica / trilateración) ----------

[env:uwb_tag]
extends = env:indoor_uwb_libs
board = esp32dev
build_flags =
	-D INDOOR_UWB_ROLE_TAG=1
	-D INDOOR_UWB_BOARD_MAKERFABS_V1=1

[env:uwb_tag_pro]
extends = env:uwb_tag
build_flags =
	-D INDOOR_UWB_ROLE_TAG=1
	-D INDOOR_UWB_BOARD_MAKERFABS_PRO_DISPLAY=1

[env:uwb_tag_esp32dev]
extends = env:uwb_tag
build_flags =
	-D INDOOR_UWB_ROLE_TAG=1
	-D INDOOR_UWB_BOARD_ESP32DEV=1

; ---------- Anchor (referencia fija) ----------

[env:uwb_anchor]
extends = env:indoor_uwb_libs
board = esp32dev
build_flags =
	-D INDOOR_UWB_ROLE_ANCHOR=1
	-D INDOOR_UWB_BOARD_MAKERFABS_V1=1

[env:uwb_anchor_pro]
extends = env:uwb_anchor
build_flags =
	-D INDOOR_UWB_ROLE_ANCHOR=1
	-D INDOOR_UWB_BOARD_MAKERFABS_PRO_DISPLAY=1

[env:uwb_anchor_esp32dev]
extends = env:uwb_anchor
build_flags =
	-D INDOOR_UWB_ROLE_ANCHOR=1
	-D INDOOR_UWB_BOARD_ESP32DEV=1

; ---------- Tests Unity (no compila src/main.cpp) ----------

[env:test_uwb_unit]
extends = env:uwb_tag
build_src_filter = -<*>
test_framework = unity
test_speed = 115200
test_filter =
	test_trilateration
	test_anchor_list
	test_board_pinout
build_flags =
	-D INDOOR_UWB_ROLE_TAG=1
	-D INDOOR_UWB_BOARD_MAKERFABS_V1=1
	-I test/src
	-I test/helpers
lib_deps =
	tomstewart89/BasicLinearAlgebra@^3.6.0

[env:test_uwb_pinout_pro]
extends = env:test_uwb_unit
build_flags =
	-D INDOOR_UWB_ROLE_TAG=1
	-D INDOOR_UWB_BOARD_MAKERFABS_PRO_DISPLAY=1
	-I test/src
	-I test/helpers
test_filter = test_board_pinout

[env:test_uwb_wifi]
extends = env:uwb_tag
build_src_filter =
	-<*>
	+<test/utils>
	+<test/src>
test_framework = unity
test_speed = 115200
test_filter = test_wifi
build_flags =
	-D INDOOR_UWB_ROLE_TAG=1
	-D INDOOR_UWB_BOARD_MAKERFABS_V1=1
	-I test/src
lib_deps =
	WiFi
