; ---------- Tests Unity (no compila src/main.cpp) ----------

[env:test_uwb_unit]
extends = env:uwb_tag
build_src_filter = -<*>
test_framework = unity
test_speed = 115200
test_filter =
	test_trilateration
	test_anchor_list
	test_board_pinout
build_flags =
	-D INDOOR_UWB_ROLE_TAG=1
	-D INDOOR_UWB_BOARD_MAKERFABS_V1=1
	-I test/src
	-I test/helpers
lib_deps =
	tomstewart89/BasicLinearAlgebra@^3.6.0

[env:test_uwb_pinout_pro]
extends = env:test_uwb_unit
build_flags =
	-D INDOOR_UWB_ROLE_TAG=1
	-D INDOOR_UWB_BOARD_MAKERFABS_PRO_DISPLAY=1
	-I test/src
	-I test/helpers
test_filter = test_board_pinout

[env:test_uwb_wifi]
extends = env:uwb_tag
build_src_filter =
	-<*>
	+<test/utils>
	+<test/src>
test_framework = unity
test_speed = 115200
test_filter = test_wifi
build_flags =
	-D INDOOR_UWB_ROLE_TAG=1
	-D INDOOR_UWB_BOARD_MAKERFABS_V1=1
	-I test/src
lib_deps =
	WiFi
