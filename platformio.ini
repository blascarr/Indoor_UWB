; Indoor_UWB — localización UWB (tag/anchor) con arquitectura Controller + Manager.
; Placas: Makerfabs ESP32 UWB v1.0 (por defecto), Pro con display, ESP32 genérico.

[platformio]
default_envs = uwb_tag

[env:indoor_uwb_libs]
framework = arduino
platform = espressif32
monitor_speed = 115200
board_build.filesystem = littlefs
extra_scripts = pre:scripts/prepare_fs.py
lib_ignore = WebServer
; ESP-NOW (sync anchor/tag): activo por defecto. Para desactivar en un env:
;   build_flags = ... -D ESPNOW_ENABLED=0
; OTA (ArduinoOTA): activo por defecto. Para desactivar + partición sin slot OTA:
;   usar entorno *_no_ota (p. ej. uwb_tag_no_ota) o manualmente:
;   build_flags = ... -D OTA_ENABLED=0
;   board_build.partitions = no_ota.csv
;   Tras cambiar particiones: pio run -t erase -e <env> && reflashear.
lib_deps =
	SPI
	WiFi
	FS
	ArduinoOTA
	Update
	me-no-dev/ESPAsyncWebServer
	me-no-dev/ESPAsyncTCP@^1.2.2
	arduino-libraries/Arduino_JSON@^0.2.0
	tomstewart89/BasicLinearAlgebra@^3.6.0

; ---------- Sin OTA: app ~2,5 MB + LittleFS ~1,4 MB (4 MB flash) ----------

[env:indoor_uwb_no_ota]
extends = env:indoor_uwb_libs
build_flags = -D OTA_ENABLED=0
board_build.partitions = no_ota.csv
lib_deps =
	SPI
	WiFi
	FS
	me-no-dev/ESPAsyncWebServer
	me-no-dev/ESPAsyncTCP@^1.2.2
	arduino-libraries/Arduino_JSON@^0.2.0
	tomstewart89/BasicLinearAlgebra@^3.6.0

; ---------- Tag (robótica / trilateración) ----------

[env:uwb_tag]
extends = env:indoor_uwb_libs
board = esp32dev
build_flags =
	-D INDOOR_UWB_ROLE_TAG=1
	-D INDOOR_UWB_BOARD_MAKERFABS_V1=1

[env:uwb_tag_pro]
extends = env:uwb_tag
build_flags =
	-D INDOOR_UWB_ROLE_TAG=1
	-D INDOOR_UWB_BOARD_MAKERFABS_PRO_DISPLAY=1

[env:uwb_tag_esp32dev]
extends = env:uwb_tag
build_flags =
	-D INDOOR_UWB_ROLE_TAG=1
	-D INDOOR_UWB_BOARD_ESP32DEV=1

[env:uwb_tag_no_ota]
extends = env:indoor_uwb_no_ota
board = esp32dev
build_flags =
	-D INDOOR_UWB_ROLE_TAG=1
	-D INDOOR_UWB_BOARD_MAKERFABS_V1=1

; ---------- Anchor (referencia fija) ----------

[env:uwb_anchor]
extends = env:indoor_uwb_libs
board = esp32dev
build_flags =
	-D INDOOR_UWB_ROLE_ANCHOR=1
	-D INDOOR_UWB_BOARD_MAKERFABS_V1=1

[env:uwb_anchor_pro]
extends = env:uwb_anchor
build_flags =
	-D INDOOR_UWB_ROLE_ANCHOR=1
	-D INDOOR_UWB_BOARD_MAKERFABS_PRO_DISPLAY=1

[env:uwb_anchor_esp32dev]
extends = env:uwb_anchor
build_flags =
	-D INDOOR_UWB_ROLE_ANCHOR=1
	-D INDOOR_UWB_BOARD_ESP32DEV=1

[env:uwb_anchor_no_ota]
extends = env:indoor_uwb_no_ota
board = esp32dev
build_flags =
	-D INDOOR_UWB_ROLE_ANCHOR=1
	-D INDOOR_UWB_BOARD_MAKERFABS_V1=1

; ---------- Anchors con identidad fija (IP, MAC WiFi, UWB, nombre) ----------
; Red: INDOOR_UWB_IP_O1..O3 + INDOOR_UWB_GW_O* + INDOOR_UWB_SUBNET_O* (ver config_network.h).
; Por defecto 192.168.1.0/24, gateway .1. Solo hace falta INDOOR_UWB_IP_O4 por anchor.
; Ejemplo otra red: -D INDOOR_UWB_IP_O1=10 -D INDOOR_UWB_IP_O2=0 -D INDOOR_UWB_IP_O3=5
;                   -D INDOOR_UWB_GW_O4=254 -D INDOOR_UWB_IP_O4=100

[env:anchor_a]
extends = env:uwb_anchor
build_flags =
	${env:uwb_anchor.build_flags}
	-D DEVICE_NAME=\"Indoor_A\"
	-D WIFI_HOST=\"Indoor_A\"
	-D INDOOR_UWB_IP_O4=210
	-D OTA_HOST=\"ANCHOR_A\"
	-D ANCHOR_UWB_ADDRESS=\"50:15:5B:D5:A9:9A:E2:81\"
	-D MAC_ADDR_0=0x40 -D MAC_ADDR_1=0x91 -D MAC_ADDR_2=0x51
	-D MAC_ADDR_3=0xAE -D MAC_ADDR_4=0x95 -D MAC_ADDR_5=0x72

