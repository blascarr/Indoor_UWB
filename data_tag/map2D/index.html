<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mapa 2D CDN — Indoor UWB</title>
  <link rel="stylesheet" href="/map.css">
</head>
<body class="map-page">
  <header class="map-header">
    <h1>Mapa 2D (Konva CDN)</h1>
    <p id="status" class="status">Cargando librería…</p>
    <nav class="map-nav" aria-label="Vistas de mapa">
      <a href="/map/">Mapa local</a>
      <a href="/map2D/" class="active">Mapa 2D CDN</a>
      <a href="/map3D/" id="nav-3d">Mapa 3D CDN</a>
      <a href="/">Portal</a>
    </nav>
    <div class="map-toolbar">
      <button type="button" id="btn-reset">Centrar</button>
      <label class="checkbox-label">
        <input type="checkbox" id="auto-refresh" checked> Auto
      </label>
    </div>
  </header>
  <div id="banner" class="map-banner hidden"></div>
  <div class="map-stage">
    <div id="konva-root" class="konva-root"></div>
    <div class="map-legend">
      <div><span class="dot-origin"></span>Origen (0,0)</div>
      <div><span class="dot-anchor"></span>Anchor</div>
      <div><span class="dot-tag"></span>Tag</div>
    </div>
  </div>
  <script src="/map-common.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/konva@9.3.6/konva.min.js"
          onerror="document.getElementById('banner').classList.remove('hidden');document.getElementById('banner').textContent='Sin acceso a CDN. Usa /map/ para vista local.';"></script>
  <script src="/map2D/map2d-konva.js"></script>
</body>
</html>
