<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mapa 2D local — Indoor UWB</title>
  <link rel="stylesheet" href="/map.css">
</head>
<body class="map-page">
  <header class="map-header">
    <h1>Mapa 2D (local)</h1>
    <p id="status" class="status">Cargando…</p>
    <nav class="map-nav" aria-label="Vistas de mapa">
      <a href="/map/" class="active">Mapa local</a>
      <a href="/map2D/">Mapa 2D CDN</a>
      <a href="/map3D/" id="nav-3d">Mapa 3D CDN</a>
      <a href="/">Portal</a>
    </nav>
    <div class="map-toolbar">
      <button type="button" id="btn-reset">Centrar</button>
      <label class="checkbox-label">
        <input type="checkbox" id="auto-refresh" checked> Auto
      </label>
    </div>
  </header>
  <div id="banner" class="map-banner hidden"></div>
  <div class="map-stage">
    <canvas id="map-canvas" aria-label="Mapa 2D de anchors y posición del tag"></canvas>
    <div class="map-legend">
      <div><span class="dot-origin"></span>Origen (0,0)</div>
      <div><span class="dot-anchor"></span>Anchor</div>
      <div><span class="dot-tag"></span>Tag</div>
    </div>
  </div>
  <script src="/map-common.js"></script>
  <script src="/map/map2d-local.js"></script>
</body>
</html>
